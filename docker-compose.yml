version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yieldplay
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yieldplay
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yieldplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── YieldPlay API + Indexer ────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://yieldplay:password@db:5432/yieldplay
      DATABASE_URL_SYNC: postgresql+psycopg2://yieldplay:password@db:5432/yieldplay
    depends_on:
      db:
        condition: service_healthy
    command: python main.py

volumes:
  postgres_data:
